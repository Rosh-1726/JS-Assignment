<!DOCTYPE html>
<html lang="en">
<head>
    <title>Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-3">🔐 Password Generator</h3>

        <!-- Password Length -->
        <label>Password Length</label>
        <input type="number" id="length" class="form-control mb-3" value="8">

        <!-- Options -->
        <div class="form-check">
            <input type="checkbox" id="numbers" class="form-check-input">
            <label class="form-check-label">Include Numbers</label>
        </div>

        <div class="form-check">
            <input type="checkbox" id="uppercase" class="form-check-input">
            <label class="form-check-label">Include Uppercase</label>
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" id="symbols" class="form-check-input">
            <label class="form-check-label">Include Special Characters</label>
        </div>

        <!-- Button -->
        <button onclick="generatePassword()" class="btn btn-primary w-100">
            Generate Password
        </button>
<div class="mt-3">
    <div class="progress" style="height: 10px;">
        <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
    </div>
    <small id="strengthText" class="fw-bold mt-1 d-block text-muted">Strength: None</small>
</div>
        <!-- Output -->
        <input type="text" id="result" class="form-control mt-3" readonly>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
